<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>breve — talk to a 3D multi-agent world</title>
  <meta name="description" content="Open a browser: a continuous 3D multi-agent world is already running. Click curriculum demos or describe a scene in English — Grok builds it, you watch it live." />
  <meta property="og:title" content="breve — continuous 3D multi-agent sandbox" />
  <meta property="og:description" content="Not another empty sim toolkit. Open the web UI and a world is already moving. Chat optional. Share links." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="/static/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <!-- Zone 1: fixed header -->
      <header class="sidebar-header">
        <div class="brand-row">
          <h1>breve</h1>
          <span class="badge">web</span>
        </div>
        <p class="tag">Continuous 3D multi-agent · browser sandbox</p>
      </header>

      <!-- Zone 2: scrollable content -->
      <div class="sidebar-scroll">
        <section class="panel settings">
          <label class="field">
            <span>xAI API key <em>optional — demos work without it</em></span>
            <input id="apiKey" type="password" placeholder="xai-… or set XAI_API_KEY on server" autocomplete="off" />
          </label>
          <p id="keyStatus" class="hint"></p>
        </section>

        <section class="panel">
          <p class="section-label">Curriculum</p>
          <div class="chips" id="curriculumChips"></div>
        </section>

        <section class="panel chat-panel">
          <p class="section-label">Build with Grok</p>
          <div id="chatLog" class="chat-log" aria-live="polite"></div>
          <form id="chatForm" class="chat-form">
            <textarea id="prompt" rows="2" placeholder="Describe a scene… heavy red ball, light yellow balls, show gravity"></textarea>
            <div class="prompt-chips" id="chips"></div>
            <div class="row btn-row">
              <button type="submit" id="sendBtn" class="primary">Build scene</button>
              <button type="button" id="refineBtn" class="ghost">Refine</button>
            </div>
          </form>
        </section>
      </div>

      <!-- Zone 3: fixed footer controls -->
      <footer class="sidebar-footer">
        <p class="section-label">Simulation</p>
        <div class="row btn-row controls-row">
          <button type="button" id="playBtn" class="primary">▶ Run</button>
          <button type="button" id="pauseBtn" class="ghost">Pause</button>
          <button type="button" id="resetBtn" class="ghost">Reset</button>
          <button type="button" id="shareBtn" class="ghost share">Share</button>
        </div>
        <div class="row examples-row">
          <select id="exampleSelect" aria-label="All examples">
            <option value="">All examples…</option>
          </select>
          <button type="button" id="loadExampleBtn" class="ghost">Load</button>
        </div>
        <p id="simStatus" class="hint status-line">Loading demo…</p>
        <p id="shareStatus" class="hint share-status"></p>
      </footer>
    </aside>

    <main id="viewport">
      <canvas id="c"></canvas>
      <div id="hud">
        <span id="hudTitle">breve</span>
        <span id="hudTime">t=0.0s</span>
      </div>
      <div id="welcome" class="welcome">
        <strong>Drag</strong> orbit · <strong>scroll</strong> zoom · scene auto-starts
      </div>
      <div id="overlay" class="overlay hidden">
        <div class="overlay-card">
          <h2 id="overlayTitle">Building scene…</h2>
          <p id="overlayBody">Grok is composing floors, masses, and camera framing.</p>
        </div>
      </div>
      <div id="toast" class="toast hidden"></div>
    </main>
  </div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
